# Azure Static Web Apps CI/CD Pipeline
# 
# SETUP INSTRUCTIONS:
# 1. Create an Azure Static Web App resource in Azure Portal
# 2. Connect it to your GitHub repository
# 3. Add these secrets to your GitHub repo (Settings > Secrets and variables > Actions):
#    - AZURE_STATIC_WEB_APPS_API_TOKEN (from Azure Portal > your static web app > Get deployment token)
#    - SUPABASE_URL (your Supabase project URL)
#    - SUPABASE_ANON_KEY (your Supabase anon/public key)
#    - SUPABASE_SERVICE_ROLE_KEY (your Supabase service role key)
#    - GOOGLE_CLIENT_ID (optional, for Google OAuth)
#    - GOOGLE_CLIENT_SECRET (optional, for Google OAuth)
#
# 4. Update the 'app_location', 'api_location', and 'output_location' below if needed
# 5. Push to main branch to trigger deployment

name: Deploy to Azure Static Web Apps

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
      - master
  workflow_dispatch:

env:
  # Frontend environment variables (embedded at build time)
  VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
  VITE_GOOGLE_AUTH_PROXY: ${{ secrets.GOOGLE_AUTH_PROXY }}

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_AUTH_PROXY: ${{ secrets.GOOGLE_AUTH_PROXY }}

      - name: Build API
        run: |
          # Azure Static Web Apps uses a specific folder structure for managed functions
          # The api folder should contain the function code
          echo "API build complete"

      - name: Deploy to Azure Static Web Apps
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: './'           # Frontend source location
          api_location: 'api'          # API/Functions location
          output_location: 'dist'      # Build output folder
          skip_app_build: false
          skip_api_build: false
        env:
          # Backend environment variables (injected at runtime)
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_AUTH_PROXY: ${{ secrets.GOOGLE_AUTH_PROXY }}

      - name: Output deployment URL
        run: |
          echo "🚀 Deployed to: ${{ steps.deploy.outputs.static_web_app_url }}"
          echo "📍 API URL: ${{ steps.deploy.outputs.static_web_app_url }}/api"

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    
    steps:
      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
