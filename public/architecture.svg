<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#991b1b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="600" y="50" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">StreamVault Architecture</text>
  
  <!-- User -->
  <g transform="translate(100, 350)">
    <circle cx="50" cy="50" r="45" fill="url(#yellowGrad)" filter="url(#shadow)"/>
    <text x="50" y="55" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">USER</text>
  </g>
  
  <!-- Frontend Box -->
  <g transform="translate(250, 200)">
    <rect x="0" y="0" width="200" height="300" rx="15" fill="#1e1e2e" stroke="#dc2626" stroke-width="3" filter="url(#shadow)"/>
    <rect x="0" y="0" width="200" height="50" rx="15" fill="url(#redGrad)"/>
    <rect x="0" y="35" width="200" height="15" fill="url(#redGrad)"/>
    <text x="100" y="32" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">FRONTEND</text>
    <text x="100" y="70" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">React + Vite</text>
    
    <text x="20" y="100" font-family="Arial, sans-serif" font-size="11" fill="#e5e7eb">• Home Page</text>
    <text x="20" y="120" font-family="Arial, sans-serif" font-size="11" fill="#e5e7eb">• Movies Browser</text>
    <text x="20" y="140" font-family="Arial, sans-serif" font-size="11" fill="#e5e7eb">• Video Player</text>
    <text x="20" y="160" font-family="Arial, sans-serif" font-size="11" fill="#e5e7eb">• Search</text>
    <text x="20" y="180" font-family="Arial, sans-serif" font-size="11" fill="#e5e7eb">• Favorites</text>
    <text x="20" y="200" font-family="Arial, sans-serif" font-size="11" fill="#e5e7eb">• Watch History</text>
    <text x="20" y="220" font-family="Arial, sans-serif" font-size="11" fill="#e5e7eb">• Admin Panel</text>
    
    <rect x="20" y="240" width="160" height="40" rx="8" fill="#2d2d3d"/>
    <text x="100" y="265" font-family="Arial, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">Tailwind CSS + Framer Motion</text>
  </g>
  
  <!-- Backend Box -->
  <g transform="translate(550, 200)">
    <rect x="0" y="0" width="200" height="300" rx="15" fill="#1e1e2e" stroke="#3b82f6" stroke-width="3" filter="url(#shadow)"/>
    <rect x="0" y="0" width="200" height="50" rx="15" fill="url(#blueGrad)"/>
    <rect x="0" y="35" width="200" height="15" fill="url(#blueGrad)"/>
    <text x="100" y="32" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">BACKEND</text>
    <text x="100" y="70" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Vercel Serverless</text>
    
    <text x="20" y="100" font-family="Arial, sans-serif" font-size="11" fill="#e5e7eb">API Routes:</text>
    <text x="20" y="120" font-family="Arial, sans-serif" font-size="11" fill="#e5e7eb">• /api/auth/*</text>
    <text x="20" y="140" font-family="Arial, sans-serif" font-size="11" fill="#e5e7eb">• /api/movies</text>
    <text x="20" y="160" font-family="Arial, sans-serif" font-size="11" fill="#e5e7eb">• /api/stream/:id</text>
    <text x="20" y="180" font-family="Arial, sans-serif" font-size="11" fill="#e5e7eb">• /api/favorites</text>
    <text x="20" y="200" font-family="Arial, sans-serif" font-size="11" fill="#e5e7eb">• /api/watch-history</text>
    <text x="20" y="220" font-family="Arial, sans-serif" font-size="11" fill="#e5e7eb">• /api/admin/*</text>
    
    <rect x="20" y="240" width="160" height="40" rx="8" fill="#2d2d3d"/>
    <text x="100" y="265" font-family="Arial, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">Node.js + Supabase Client</text>
  </g>
  
  <!-- Database Box -->
  <g transform="translate(850, 150)">
    <rect x="0" y="0" width="200" height="150" rx="15" fill="#1e1e2e" stroke="#10b981" stroke-width="3" filter="url(#shadow)"/>
    <rect x="0" y="0" width="200" height="50" rx="15" fill="url(#greenGrad)"/>
    <rect x="0" y="35" width="200" height="15" fill="url(#greenGrad)"/>
    <text x="100" y="32" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">DATABASE</text>
    <text x="100" y="70" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Supabase PostgreSQL</text>
    
    <text x="20" y="95" font-family="Arial, sans-serif" font-size="11" fill="#e5e7eb">Tables:</text>
    <text x="20" y="115" font-family="Arial, sans-serif" font-size="11" fill="#e5e7eb">• users, movies</text>
    <text x="20" y="135" font-family="Arial, sans-serif" font-size="11" fill="#e5e7eb">• favorites, watch_history</text>
  </g>
  
  <!-- Azure Storage Box -->
  <g transform="translate(850, 350)">
    <rect x="0" y="0" width="200" height="150" rx="15" fill="#1e1e2e" stroke="#8b5cf6" stroke-width="3" filter="url(#shadow)"/>
    <rect x="0" y="0" width="200" height="50" rx="15" fill="url(#purpleGrad)"/>
    <rect x="0" y="35" width="200" height="15" fill="url(#purpleGrad)"/>
    <text x="100" y="32" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">AZURE BLOB</text>
    <text x="100" y="70" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Video Storage</text>
    
    <text x="20" y="95" font-family="Arial, sans-serif" font-size="11" fill="#e5e7eb">Account: streamvaultmovies</text>
    <text x="20" y="115" font-family="Arial, sans-serif" font-size="11" fill="#e5e7eb">Container: movies</text>
    <text x="20" y="135" font-family="Arial, sans-serif" font-size="11" fill="#e5e7eb">Access: SAS Token (2hr)</text>
  </g>
  
  <!-- Google OAuth Box -->
  <g transform="translate(550, 550)">
    <rect x="0" y="0" width="200" height="100" rx="15" fill="#1e1e2e" stroke="#f59e0b" stroke-width="3" filter="url(#shadow)"/>
    <rect x="0" y="0" width="200" height="50" rx="15" fill="url(#yellowGrad)"/>
    <rect x="0" y="35" width="200" height="15" fill="url(#yellowGrad)"/>
    <text x="100" y="32" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">GOOGLE OAUTH</text>
    <text x="100" y="70" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Authentication Provider</text>
    <text x="100" y="90" font-family="Arial, sans-serif" font-size="11" fill="#e5e7eb" text-anchor="middle">JWT Tokens + User Sessions</text>
  </g>
  
  <!-- Arrows -->
  <!-- User to Frontend -->
  <path d="M 195 400 L 245 350" stroke="#f59e0b" stroke-width="3" fill="none" marker-end="url(#arrowYellow)"/>
  <defs>
    <marker id="arrowYellow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/>
    </marker>
  </defs>
  
  <!-- Frontend to Backend -->
  <path d="M 450 350 L 545 350" stroke="#dc2626" stroke-width="3" fill="none" marker-end="url(#arrowRed)"/>
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/>
    </marker>
  </defs>
  
  <!-- Backend to Database -->
  <path d="M 750 300 L 845 250" stroke="#3b82f6" stroke-width="3" fill="none" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Backend to Azure -->
  <path d="M 750 400 L 845 425" stroke="#8b5cf6" stroke-width="3" fill="none" marker-end="url(#arrowPurple)"/>
  <defs>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8b5cf6"/>
    </marker>
  </defs>
  
  <!-- Backend to Google OAuth -->
  <path d="M 650 500 L 650 545" stroke="#f59e0b" stroke-width="3" fill="none" marker-end="url(#arrowYellow)"/>
  
  <!-- Flow Labels -->
  <text x="220" y="365" font-family="Arial, sans-serif" font-size="10" fill="#9ca3af">1. Browse</text>
  <text x="480" y="340" font-family="Arial, sans-serif" font-size="10" fill="#9ca3af">2. API Request</text>
  <text x="780" y="265" font-family="Arial, sans-serif" font-size="10" fill="#9ca3af">3. Query</text>
  <text x="780" y="440" font-family="Arial, sans-serif" font-size="10" fill="#9ca3af">4. Get SAS URL</text>
  
  <!-- Legend -->
  <g transform="translate(50, 650)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Legend:</text>
    <rect x="0" y="20" width="20" height="20" rx="4" fill="url(#redGrad)"/>
    <text x="30" y="35" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af">Frontend (React)</text>
    <rect x="150" y="20" width="20" height="20" rx="4" fill="url(#blueGrad)"/>
    <text x="180" y="35" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af">Backend (API)</text>
    <rect x="300" y="20" width="20" height="20" rx="4" fill="url(#greenGrad)"/>
    <text x="330" y="35" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af">Database</text>
    <rect x="420" y="20" width="20" height="20" rx="4" fill="url(#purpleGrad)"/>
    <text x="450" y="35" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af">Azure Storage</text>
    <rect x="570" y="20" width="20" height="20" rx="4" fill="url(#yellowGrad)"/>
    <text x="600" y="35" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af">Auth Provider</text>
  </g>
  
  <!-- Deployment Options -->
  <g transform="translate(50, 720)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Deployment Options:</text>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af">• Vercel (Recommended) - Auto CI/CD, Serverless Functions</text>
    <text x="0" y="45" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af">• Azure App Service - Full control, integrated with Azure Storage</text>
    <text x="500" y="25" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af">• Docker - Containerized deployment anywhere</text>
    <text x="500" y="45" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af">• Self-hosted VPS - Full control with PM2 + Nginx</text>
  </g>
</svg>
